services:
  postgres:
    image: postgres:16
    container_name: spider_xhs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spider_xhs
      POSTGRES_USER: spider_xhs
      POSTGRES_PASSWORD: spider_xhs_password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: spider_xhs_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123456
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
